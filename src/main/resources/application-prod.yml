
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/batchDB?createDatabaseIfNotExist=true
    username: root
    password: boss
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
      show-sql: true

  sql:
    init:
      mode: always
    logging:
      level:
        sql: DEBUG
        jdbc: DEBUG

  logging:
    level:
      org:
        hibernate:
          SQL: DEBUG
          type: DEBUG
      spring:
        framework: DEBUG

  actuator:
    endpoints:
      web:
        exposure:
          include: '*'
    endpoint:
      health:
        show-details: always
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: ALWAYS
